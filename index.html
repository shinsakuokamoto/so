<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <div class="menu">

    <div class="name">SO</div>

    <!-- project -->
    <div class="menu-block">
      <div class="menu-title has-plus">100%</div>
      <div class="submenu" id="project-list"></div>
    </div>

    <!-- text -->
    <div class="menu-block">
      <div class="menu-title has-plus">70%(tx)</div>
      <div class="submenu" id="text-list"></div>
    </div>

    <!-- demo -->
    <div class="menu-block">
      <div class="menu-title has-plus">30%(demo)</div>
      <div class="submenu" id="demo-list"></div>
    </div>

    <!-- about -->
    <div class="menu-block">
      <div class="menu-title has-plus">cv</div>
      <div class="submenu" id="about-list"></div>
    </div>

    <!-- link -->
    <div class="menu-block">
      <div class="menu-title has-plus">link</div>
      <div class="submenu" id="link-list"></div>
    </div>

    <!-- image -->
    <div class="flickr-image">
      <img
        src="https://live.staticflickr.com/65535/55095349705_6d0fec9fac_b.jpg"
        alt=""
        loading="lazy"

  </div>

<script src="script.js"></script>
