<script>
// ===== 設定 =====
const SHEET_ID = "1uakXSK0EOAc7HQjgjsNMQHtrXoozHGk1khORkhg3Ig0";
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=`;

// ===== URL =====
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const type = params.get("type");

// ===== CSV =====
function parseCSV(str) {
  const rows = str.trim().split("\n");

  const headers = rows[0]
    .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
    .map(h => h.replace(/"/g, "").trim());

  return rows.slice(1).map(row => {
    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    let obj = {};
    headers.forEach((h, i) => {
      let val = cols[i] || "";
      val = val.replace(/^"|"$/g, "").trim();
      obj[h] = val;
    });

    return obj;
  });
}

async function loadSheet(name) {
  const res = await fetch(BASE + name);
  const text = await res.text();
  return parseCSV(text);
}

// ===== 描画 =====
async function render() {
  const container = document.getElementById("detail");
  container.innerHTML = "";

  const sheetName = (type === "demo") ? "demo" : "project";
  const data = await loadSheet(sheetName);

  const d = data.find(x => x.id === id);

  if (!d) {
    container.innerHTML = "not found";
    return;
  }

  // タイトル
  const title = document.createElement("div");
  title.textContent = d.title;
  container.appendChild(title);

  // ===== project =====
  if (type === "project") {
    const meta = document.createElement("div");
    meta.className = "project-meta";
    meta.innerHTML = `
      <div><span>type:</span> ${d.type || ""}</div>
      <div><span>year:</span> ${d.year || ""}</div>
      <div><span>location:</span> ${d.location || ""}</div>
      <div><span>w:</span> ${d.w || ""}</div>
    `;
    container.appendChild(meta);
  }

  // ===== demo =====
  if (type === "demo") {
    const meta = document.createElement("div");
    meta.className = "project-meta";
    meta.innerHTML = `
      <div><span>type:</span> ${d.type || ""}</div>
      <div><span>year:</span> ${d.year || ""}</div>
      <div><span>location:</span> ${d.location || ""}</div>
      <div><span>w:</span> ${d.w || ""}</div>
    `;
    container.appendChild(meta);
  }

  // 説明
  if (d.description) {
    const desc = document.createElement("div");
    desc.style.marginTop = "12px";
    desc.innerHTML = d.description.replace(/\n/g, "<br>");
    container.appendChild(desc);
  }

  // 画像
  ["image_url_1","image_url_2","image_url_3","image_url_4"].forEach(key => {
    if (d[key]) {
      const img = document.createElement("img");
      img.src = d[key];
      img.style.marginTop = "16px";
      img.style.maxWidth = "100%";
      container.appendChild(img);
    }
  });
}

render();

// ===== 戻る =====
const backBtn = document.getElementById("back-btn");
if (backBtn) {
  backBtn.addEventListener("click", () => history.back());
}
</script>
