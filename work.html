<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <div class="menu">

    <!-- 上部 -->
    <div class="name-row">
      <div class="name">
        <a href="index.html">SO</a>
      </div>
      <div id="clock"></div>
    </div>

    <!-- コンテンツ -->
    <div id="detail"></div>

  </div>
</div>

<script>
// ===== 設定 =====
const SHEET_ID = "1uakXSK0EOAc7HQjgjsNMQHtrXoozHGk1khORkhg3Ig0";
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=`;

// ===== URL取得 =====
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const type = params.get("type"); // project / demo

// ===== CSVパース（安定版） =====
function parseCSV(str) {
  const rows = str.trim().split("\n");

  const headers = rows[0]
    .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
    .map(h => h.replace(/"/g, "").trim());

  return rows.slice(1).map(row => {
    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    let obj = {};
    headers.forEach((h, i) => {
      let val = cols[i] || "";
      val = val.replace(/^"|"$/g, "").trim();
      obj[h] = val;
    });

    return obj;
  });
}

// ===== 読み込み =====
async function loadSheet(name) {
  const res = await fetch(BASE + name);
  const text = await res.text();
  return parseCSV(text);
}

// ===== 描画 =====
async function render() {
  const data = await loadSheet(type);
  const container = document.getElementById("detail");

  const d = data.find(x => x.id === id);

  if (!d) {
    container.innerHTML = "not found";
    return;
  }

  // ===== タイトル =====
  const title = document.createElement("div");
  title.textContent = d.title;
  container.appendChild(title);

  // ===== 分岐 =====
  if (type === "project") {

    // メタ情報
    const meta = document.createElement("div");
    meta.className = "project-meta";
    meta.innerHTML = `
  <div><span>year:</span> ${d.year || ""}</div>
  <div><span>location:</span> ${d.location || ""}</div>
  <div><span>w:</span> ${d.w || ""}</div>
`;
    container.appendChild(meta);

  }

  if (type === "demo") {

    // demoはシンプル（必要なら後で追加）
    const meta = document.createElement("div");
    meta.className = "project-meta";
    meta.textContent = `${d.year || ""}`;
    container.appendChild(meta);

  }

  // ===== 説明 =====
  if (d.description) {
    const desc = document.createElement("div");
    desc.style.marginTop = "12px";
    desc.innerHTML = d.description.replace(/\n/g, "<br>");
    container.appendChild(desc);
  }

  // ===== 画像 =====
  ["image_url_1","image_url_2","image_url_3","image_url_4","image_url_5"].forEach(key => {
    if (d[key]) {
      const img = document.createElement("img");
      img.src = d[key];
      img.style.marginTop = "16px";
      img.style.maxWidth = "100%";
      container.appendChild(img);
    }
  });
}

render();


// ===== ランダム時計（そのまま使える） =====
const zones = [
  { tz: "Asia/Tokyo", label: "JST" },
  { tz: "Europe/Rome", label: "CET" },
  { tz: "America/New_York", label: "EST" },
  { tz: "Europe/London", label: "GMT" },
  { tz: "Asia/Seoul", label: "KST" },
  { tz: "Australia/Sydney", label: "AEST" }
];

const zone = zones[Math.floor(Math.random() * zones.length)];

function updateClock() {
  const now = new Date();

  const time = now.toLocaleTimeString("en-GB", {
    timeZone: zone.tz,
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  document.getElementById("clock").textContent = `${time} ${zone.label}`;
}

setInterval(updateClock, 1000);
updateClock();

</script>

</body>
</html>
